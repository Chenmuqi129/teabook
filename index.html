<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍃</text></svg>">
    <title>茶叶管理系统-带历史明细版</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary-color: #2d5a27;
            --primary-light: #e8f5e9;
            --accent-color: #f57c00;
            --bg-color: #f4f7f2;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --border-color: #dcdfe6;
            --danger-color: #e74c3c;
            --shadow: 0 4px 12px rgba(0,0,0,0.05);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 10px; }
        .container { max-width: 1000px; margin: 0 auto; padding-bottom: 50px; }

        header { text-align: center; padding: 15px 0; background: var(--primary-color); color: white; border-radius: 12px; margin-bottom: 15px; }
        .date-picker { border: none; background: rgba(255,255,255,0.2); color: white; padding: 6px 12px; border-radius: 20px; outline: none; }

        .price-settings { background: var(--card-bg); padding: 12px; border-radius: 12px; margin-bottom: 15px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; border: 1px dashed var(--primary-color); }
        .price-group label { display: block; font-size: 0.7rem; color: var(--text-muted); }
        .price-group input { width: 100%; border: 1px solid var(--border-color); border-radius: 4px; padding: 4px; font-weight: bold; }

        .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .summary-item { background: var(--card-bg); padding: 12px 5px; border-radius: 12px; text-align: center; box-shadow: var(--shadow); }
        .summary-item span { font-size: 0.75rem; color: var(--text-muted); display: block; }
        .summary-item b { font-size: 1rem; color: var(--primary-color); display: block; }

        .section { background: var(--card-bg); border-radius: 12px; margin-bottom: 15px; box-shadow: var(--shadow); overflow: hidden; }
        .section-header { padding: 10px 15px; background-color: var(--primary-light); display: flex; justify-content: space-between; align-items: center; }
        .section-header h3 { margin: 0; font-size: 0.9rem; color: var(--primary-color); }

        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; font-size: 13px; }
        th { text-align: left; color: var(--text-muted); padding: 8px; border-bottom: 1px solid var(--border-color); }
        td { padding: 8px 5px; }

        input, select { width: 100%; padding: 8px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 13px; }
        .btn-add { width: 100%; padding: 8px; background: var(--primary-light); color: var(--primary-color); border: 1px dashed var(--primary-color); border-radius: 8px; margin-top: 10px; font-weight: bold; }
        .btn-del { background: #fff1f0; color: var(--danger-color); border: none; padding: 4px 8px; border-radius: 4px; }
        .btn-save { width: 100%; padding: 14px; background: var(--primary-color); color: white; font-size: 1rem; border-radius: 10px; border: none; margin-top: 10px; }

        /* 历史明细样式 */
        .history-section { margin-top: 30px; }
        .history-item { background: white; border-radius: 10px; padding: 12px; margin-bottom: 10px; box-shadow: var(--shadow); border-left: 4px solid var(--primary-color); }
        .history-main { display: flex; justify-content: space-between; align-items: center; }
        .history-detail { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px dashed #eee; font-size: 0.8rem; color: #666; }
        .detail-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
        
        .box-group { background: #fffaf0; padding: 4px; border-radius: 4px; display: none; margin-top: 4px; }
        .backup-btn { background: #27ae60; color: white; width: 100%; padding: 12px; border-radius: 10px; border: none; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🍃 茶叶管理系统</h1>
        <input type="date" id="mainDate" class="date-picker">
    </header>

    <div class="summary-grid">
        <div class="summary-item"><span>总收入</span><b id="finalIncome">0.00</b></div>
        <div class="summary-item"><span>总支出</span><b id="finalExpense">0.00</b></div>
        <div class="summary-item"><span>当日利润</span><b id="finalProfit" style="color:var(--accent-color)">0.00</b></div>
    </div>

    <div class="section">
        <div class="section-header">
            <h3>💰 销售收入 (卖茶)</h3>
            <span id="salesTotalDisp" style="font-weight:bold; color:var(--primary-color)">¥ 0.00</span>
        </div>
        <div class="section-content">
            <div class="table-wrapper">
                <table>
                    <thead><tr><th>买家/种类</th><th>销售形式</th><th>单价/斤数</th><th>小计</th><th></th></tr></thead>
                    <tbody id="salesBody">
                        <tr>
                            <td>
                                <input type="text" class="s-buyer" placeholder="买家" style="margin-bottom:4px">
                                <select class="s-variety"><option>毛尖</option><option>春茶</option><option>夏茶</option></select>
                            </td>
                            <td>
                                <select class="s-type" onchange="toggleBox(this)">
                                    <option value="fresh">新鲜茶叶</option>
                                    <option value="dry_normal">干茶-普通</option>
                                    <option value="dry_box">干茶-礼盒</option>
                                </select>
                                <div class="box-group">
                                    <span style="font-size:10px; color:var(--accent-color)">礼盒单价:</span>
                                    <input type="number" class="s-box-price" placeholder="金额" oninput="calcAll()">
                                </div>
                            </td>
                            <td>
                                <input type="number" class="s-price" placeholder="单价" oninput="calcAll()" style="margin-bottom:4px">
                                <input type="number" class="s-weight" placeholder="斤数" oninput="calcAll()">
                            </td>
                            <td style="font-weight:bold" class="s-subtotal">0.00</td>
                            <td><button type="button" class="btn-del" onclick="removeRow(this)">✕</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <button type="button" class="btn-add" onclick="addRow('salesBody')">+ 添加销售记录</button>
        </div>
    </div>

    <div class="price-settings">
        <div class="price-group"><label>全天单价</label><input type="number" id="price_all" value="30" oninput="calcAll()"></div>
        <div class="price-group"><label>上午单价</label><input type="number" id="price_am" value="35" oninput="calcAll()"></div>
        <div class="price-group"><label>下午单价</label><input type="number" id="price_pm" value="25" oninput="calcAll()"></div>
    </div>

    <form id="accountingForm">
        <div class="section">
            <div class="section-header"><h3>👤 采茶工人工资</h3><span id="laborTotalDisp" style="font-weight:bold">0.00</span></div>
            <div class="section-content">
                <div class="table-wrapper">
                    <table>
                        <thead><tr><th>姓名</th><th>时段</th><th>斤数</th><th>金额</th><th></th></tr></thead>
                        <tbody id="workerBody">
                            <tr>
                                <td><input type="text" class="w-name" placeholder="姓名"></td>
                                <td><select class="w-period" onchange="calcAll()"><option value="all">全天</option><option value="am">上午</option><option value="pm">下午</option></select></td>
                                <td><input type="number" class="w-weight" oninput="calcAll()" placeholder="0.0"></td>
                                <td class="w-subtotal">0.00</td>
                                <td><button type="button" class="btn-del" onclick="removeRow(this)">✕</button></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <button type="button" class="btn-add" onclick="addRow('workerBody')">+ 添加工人</button>
            </div>
        </div>

        <div class="section">
            <div class="section-header"><h3>🔥 炒制加工费</h3><span id="factoryTotalDisp" style="font-weight:bold">0.00</span></div>
            <div class="section-content">
                <div class="table-wrapper">
                    <table>
                        <thead><tr><th>项目</th><th>单价</th><th>斤数</th><th>金额</th><th></th></tr></thead>
                        <tbody id="factoryBody">
                            <tr>
                                <td><input type="text" class="f-item" value="炒茶加工"></td>
                                <td><input type="number" class="f-price" oninput="calcAll()" placeholder="0"></td>
                                <td><input type="number" class="f-weight" oninput="calcAll()" placeholder="0"></td>
                                <td class="f-subtotal">0.00</td>
                                <td><button type="button" class="btn-del" onclick="removeRow(this)">✕</button></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <button type="button" class="btn-add" onclick="addRow('factoryBody')">+ 添加加工记录</button>
            </div>
        </div>

        <button type="submit" class="btn-save">💾 保存并锁定今日账单</button>
    </form>

    <div class="history-section">
        <h3 style="color:var(--primary-color); border-bottom:2px solid var(--primary-light); padding-bottom:5px;">🕒 历史账单明细</h3>
        <div id="historyList"></div>
        <button type="button" class="backup-btn" onclick="exportToExcel()">📊 导出详细 Excel 备份</button>
    </div>
</div>

<script>
    const DB_KEY = 'tea_master_v6_final';
    document.getElementById('mainDate').valueAsDate = new Date();

    function addRow(id) {
        const tbody = document.getElementById(id);
        const row = tbody.rows[0].cloneNode(true);
        row.querySelectorAll('input').forEach(i => i.value = '');
        row.querySelector('.w-subtotal, .f-subtotal, .s-subtotal').innerText = '0.00';
        if(id === 'salesBody') row.querySelector('.box-group').style.display = 'none';
        tbody.appendChild(row);
    }

    function removeRow(btn) {
        const tbody = btn.closest('tbody');
        if(tbody.rows.length > 1) { btn.closest('tr').remove(); calcAll(); }
    }

    function toggleBox(select) {
        select.parentElement.querySelector('.box-group').style.display = (select.value === 'dry_box') ? 'block' : 'none';
        calcAll();
    }

    function calcAll() {
        const pAll = parseFloat(document.getElementById('price_all').value) || 0;
        const pAm = parseFloat(document.getElementById('price_am').value) || 0;
        const pPm = parseFloat(document.getElementById('price_pm').value) || 0;

        let labor = 0, factory = 0, sales = 0;

        document.querySelectorAll('#workerBody tr').forEach(r => {
            const w = parseFloat(r.querySelector('.w-weight').value) || 0;
            const p = r.querySelector('.w-period').value;
            const sub = w * (p === 'am' ? pAm : (p === 'pm' ? pPm : pAll));
            r.querySelector('.w-subtotal').innerText = sub.toFixed(2);
            labor += sub;
        });

        document.querySelectorAll('#factoryBody tr').forEach(r => {
            const sub = (parseFloat(r.querySelector('.f-price').value) || 0) * (parseFloat(r.querySelector('.f-weight').value) || 0);
            r.querySelector('.f-subtotal').innerText = sub.toFixed(2);
            factory += sub;
        });

        document.querySelectorAll('#salesBody tr').forEach(r => {
            const sub = (parseFloat(r.querySelector('.s-price').value) || 0) * (parseFloat(r.querySelector('.s-weight').value) || 0) + (r.querySelector('.s-type').value === 'dry_box' ? (parseFloat(r.querySelector('.s-box-price').value) || 0) * (parseFloat(r.querySelector('.s-weight').value) || 0) : 0);
            r.querySelector('.s-subtotal').innerText = sub.toFixed(2);
            sales += sub;
        });

        document.getElementById('laborTotalDisp').innerText = labor.toFixed(2);
        document.getElementById('factoryTotalDisp').innerText = factory.toFixed(2);
        document.getElementById('salesTotalDisp').innerText = sales.toFixed(2);
        document.getElementById('finalIncome').innerText = sales.toFixed(2);
        document.getElementById('finalExpense').innerText = (labor + factory).toFixed(2);
        document.getElementById('finalProfit').innerText = (sales - (labor + factory)).toFixed(2);
        return { income: sales, expense: labor + factory, profit: sales - (labor + factory) };
    }

    document.getElementById('accountingForm').addEventListener('submit', e => {
        e.preventDefault();
        const info = calcAll();
        const date = document.getElementById('mainDate').value;
        const details = [];

        document.querySelectorAll('#workerBody tr').forEach(r => {
            if(r.querySelector('.w-name').value) details.push({项目:'采茶', 姓名:r.querySelector('.w-name').value, 详情:r.querySelector('.w-period').selectedOptions[0].text+' '+r.querySelector('.w-weight').value+'斤', 金额:r.querySelector('.w-subtotal').innerText});
        });
        document.querySelectorAll('#factoryBody tr').forEach(r => {
            if(r.querySelector('.f-weight').value) details.push({项目:'加工', 姓名:r.querySelector('.f-item').value, 详情:r.querySelector('.f-weight').value+'斤', 金额:r.querySelector('.f-subtotal').innerText});
        });
        document.querySelectorAll('#salesBody tr').forEach(r => {
            if(r.querySelector('.s-buyer').value) details.push({项目:'销售', 姓名:r.querySelector('.s-buyer').value, 详情:r.querySelector('.s-variety').value+'('+r.querySelector('.s-type').selectedOptions[0].text+')', 金额:r.querySelector('.s-subtotal').innerText});
        });

        let db = JSON.parse(localStorage.getItem(DB_KEY) || '[]');
        db.unshift({ date, ...info, details });
        localStorage.setItem(DB_KEY, JSON.stringify(db));
        alert('保存成功！');
        renderHistory();
    });

    function renderHistory() {
        const db = JSON.parse(localStorage.getItem(DB_KEY) || '[]');
        document.getElementById('historyList').innerHTML = db.map((d, i) => `
            <div class="history-item">
                <div class="history-main">
                    <div><b>📅 ${d.date}</b> <span style="margin-left:10px; color:${d.profit>=0? 'green':'red'}">利润: ¥${d.profit.toFixed(2)}</span></div>
                    <div style="font-size:12px;"><button onclick="toggleDetail(${i})" style="border:none; background:var(--primary-light); color:var(--primary-color); border-radius:4px; padding:4px 8px; cursor:pointer;">查看明细</button> <button onclick="delRec(${i})" style="border:none; background:#fff1f0; color:red; margin-left:5px;">✕</button></div>
                </div>
                <div id="detail-${i}" class="history-detail">
                    ${d.details.map(item => `<div class="detail-row"><span>${item.项目}: ${item.姓名} (${item.详情})</span><span>¥${item.金额}</span></div>`).join('')}
                    <div class="detail-row" style="margin-top:5px; padding-top:5px; border-top:1px solid #eee; font-weight:bold;"><span>当日汇总</span><span>收入:¥${d.income.toFixed(2)} / 支出:¥${d.expense.toFixed(2)}</span></div>
                </div>
            </div>
        `).join('');
    }

    function toggleDetail(i) {
        const el = document.getElementById(`detail-${i}`);
        el.style.display = (el.style.display === 'block') ? 'none' : 'block';
    }

    function delRec(i) { if(confirm('删除这条记录？')) { let db = JSON.parse(localStorage.getItem(DB_KEY)); db.splice(i,1); localStorage.setItem(DB_KEY, JSON.stringify(db)); renderHistory(); } }

    function exportToExcel() {
        const db = JSON.parse(localStorage.getItem(DB_KEY) || '[]');
        if(!db.length) return alert('没有历史数据');
        const flat = [];
        db.forEach(d => {
            flat.push({日期: d.date, 项目: '汇总', 详情: `利润:${d.profit.toFixed(2)}`, 金额: `收:${d.income.toFixed(2)} / 支:${d.expense.toFixed(2)}`});
            d.details.forEach(it => flat.push({日期: d.date, 项目: it.项目, 姓名: it.姓名, 详情: it.详情, 金额: it.金额}));
            flat.push({});
        });
        const ws = XLSX.utils.json_to_sheet(flat);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "茶叶账单");
        XLSX.writeFile(wb, `茶叶账单备份_${new Date().toLocaleDateString()}.xlsx`);
    }

    window.onload = renderHistory;
</script>
</body>
</html>
